name: Build
on:
  push:
      branches:
        - 'main'
  pull_request:
  schedule:
    - cron: '18 02 * * *'
  # can be run manually on https://github.com/cockpit-project/cockpit-docs/actions
  workflow_dispatch:

env:
  REPO_OWNER: "${{ github.repository_owner }}"
  REPO_NAME: "${{ github.event.repository.name }}"

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build antora

    permissions:
      contents: read  # access to check out code and install dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Get domain name
        id: domain
        run: |
          if [[ ${{ env.REPO_OWNER }} == "cockpit-project" ]]
          then
            echo "domain_name=$(cat CNAME)" >> $GITHUB_OUTPUT
          else
            echo "domain_name=${{ env.REPO_OWNER }}.github.io/${{ env.REPO_NAME }}" >> $GITHUB_OUTPUT
          fi

      - name: Build Antora
        run: pnpm build
        env:
          URL: https://${{ steps.domain.outputs.domain_name }}

      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/site

  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
